services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: courier_tracking
      MYSQL_USER: courier
      MYSQL_PASSWORD: ${DB_PASSWORD:-courier123}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
    ports:
      - "127.0.0.1:3306:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/courier_tracking
      SPRING_DATASOURCE_USERNAME: courier
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-courier123}
    ports:
      - "8080:8080"
