spring:
  application:
    name: courier-tracking

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/courier_tracking}
    username: ${SPRING_DATASOURCE_USERNAME:courier}
    password: ${SPRING_DATASOURCE_PASSWORD:courier123}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      leak-detection-threshold: 60000
      connection-init-sql: "SET SESSION innodb_lock_wait_timeout = 5"

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p --- [%15.15t] %-40.40logger{39} : %replace(%m){'[\\r\\n]', '_'}%n%wEx"

tracking:
  entrance:
    radius-meters: 100
    debounce: 1m
  max-clock-skew: 5m
